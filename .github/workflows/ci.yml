name: CI

on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint --if-present
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests (core, cobertura >= 90%)
        run: npm run test:core
      - name: Unit tests (web — infra/SyncEngine)
        run: npm run test --workspace @habit/web
      - name: Build (core + web)
        run: npm run build

  database:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      # Sobe o stack local aplicando TODAS as migrations (valida que aplicam
      # limpo) e roda os testes pgTAP: isolamento por RLS + streak SQL × domínio.
      - name: Start Supabase (aplica migrations)
        run: supabase start
      - name: Database tests (pgTAP — RLS + métricas)
        run: supabase test db

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install
        run: npm ci
      - name: Build core (workspace do web depende dele)
        run: npm run build --workspace @habit/core
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      # Roda o app em modo demo offline (sem Supabase); o Playwright sobe o dev server.
      - name: E2E (Playwright)
        run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
